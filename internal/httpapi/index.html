<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cofiswarm Observer</title>
<style>
  /* ---- design tokens (retro orange/cream) ---- */
  :root {
    --bg:#f6f5f0; --panel:#fff; --panel-inner:#f0ede6;
    --border:#d8d6cc; --border-subtle:#e8e6df;
    --accent:#b85c38; --accent-dim:#9a4a28; --accent-bright:#c87050;
    --text:#2a2420; --text-muted:#6a6058; --text-dim:#9a9088;
    --ok:#1a7a42; --warn:#b45309; --crit:#c0392b;
    --btn-grad:linear-gradient(135deg,#c87050 0%,#a04830 100%);
    --gap:14px; --radius:6px;
    --mono:"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:var(--mono); font-size:13px; line-height:1.4; }

  /* ---- header ---- */
  .obs-header { display:flex; align-items:center; gap:14px;
    padding:12px 20px; border-bottom:1px solid var(--border); background:var(--panel); }
  .obs-logo { width:34px; height:34px; border-radius:var(--radius); background:var(--btn-grad);
    display:grid; place-items:center; color:#fff; font-size:18px; }
  .obs-title { font-size:20px; font-weight:700; color:var(--accent); letter-spacing:.01em; }
  .obs-sub { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; }
  .obs-tools { margin-left:auto; display:flex; align-items:center; gap:14px; }
  .obs-conn { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-muted);
    text-transform:uppercase; letter-spacing:.06em; }
  .obs-conn .dot { width:9px; height:9px; border-radius:50%; background:var(--text-dim); }
  .obs-conn.live .dot { background:var(--ok); box-shadow:0 0 6px var(--ok); }
  .obs-conn.error .dot { background:var(--crit); box-shadow:0 0 6px var(--crit); }

  #banner { display:none; padding:9px 20px; background:#fbeae6; color:var(--crit);
    border-bottom:1px solid var(--crit); font-size:12px; }
  #banner.show { display:block; }

  /* ---- free-placement layout: cards are absolutely positioned by JS (applyPos) ---- */
  .grid { position:relative; }
  .card { position:absolute; box-sizing:border-box; overflow:hidden;
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    border-left:3px solid var(--accent); display:flex; flex-direction:column; }
  .card.hide { display:none; }
  /* dashed cell showing where a dragged widget will land */
  .drop-preview { position:absolute; z-index:1; pointer-events:none;
    border:2px dashed var(--accent); border-radius:var(--radius); background:rgba(184,92,56,.07); }
  /* bottom-right resize grip (corner triangle), revealed on hover */
  .resize-h { position:absolute; right:0; bottom:0; width:16px; height:16px;
    cursor:nwse-resize; z-index:6; opacity:0; transition:opacity .12s; }
  .resize-h::after { content:""; position:absolute; right:3px; bottom:3px; width:7px; height:7px;
    border-right:2px solid var(--text-muted); border-bottom:2px solid var(--text-muted); }
  .card:hover .resize-h { opacity:.7; }
  .resize-h:hover { opacity:1; }
  .card-h { display:flex; align-items:center; gap:8px; padding:10px 12px;
    border-bottom:1px solid var(--border-subtle);
    cursor:grab; user-select:none; touch-action:none; }
  .card-h:active { cursor:grabbing; }
  .card-h .grip { color:var(--text-dim); letter-spacing:-2px; font-size:13px; }
  .card.dragging { opacity:.35; }
  .drag-ghost { position:fixed; z-index:1000; pointer-events:none; opacity:.9;
    box-shadow:0 10px 28px rgba(0,0,0,.28); transform:rotate(1.5deg); margin:0; }
  /* header tools: Add widget menu + Reset */
  .obs-add { position:relative; }
  .obs-btn { font:inherit; font-size:12px; color:var(--accent); background:var(--panel-inner);
    border:1px solid var(--border); border-radius:var(--radius); padding:4px 10px; cursor:pointer; }
  .obs-btn:hover { background:var(--accent); color:var(--panel); border-color:var(--accent); }
  .obs-menu { position:absolute; right:0; top:120%; z-index:1100; min-width:170px; display:none;
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:0 8px 24px rgba(0,0,0,.18); padding:4px; }
  .obs-menu.open { display:block; }
  .obs-menu button { display:block; width:100%; text-align:left; font:inherit; font-size:12px;
    color:var(--text); background:none; border:0; padding:6px 10px; cursor:pointer; border-radius:4px; }
  .obs-menu button:hover { background:var(--panel-inner); color:var(--accent); }
  .obs-menu .empty { padding:6px 10px; font-size:12px; color:var(--text-dim); }
  .card-h .ttl { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--accent); font-weight:700; }
  .card-h .x { margin-left:auto; color:var(--text-dim); cursor:pointer; border:0; background:none; font-size:14px; }
  .card-h .x:hover { color:var(--crit); }
  .card-b { padding:14px 12px; flex:1; overflow:auto; }
  .clear-alerts { float:right; margin:-2px 0 8px 8px; padding:2px 10px; font:inherit; font-size:11px;
    color:var(--accent); background:var(--panel-inner); border:1px solid var(--border);
    border-radius:var(--radius); cursor:pointer; }
  .clear-alerts:hover { color:var(--panel); background:var(--accent); border-color:var(--accent); }
  .span2{grid-column:span 2}.span3{grid-column:span 3}.span4{grid-column:span 4}
  .span5{grid-column:span 5}.span6{grid-column:span 6}.span8{grid-column:span 8}
  @media(max-width:900px){ .grid{grid-template-columns:repeat(6,1fr)} [class*=span]{grid-column:span 6} }

  /* ---- stat ---- */
  .stat .big { font-size:46px; font-weight:700; line-height:1; }
  .stat .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); margin-top:8px; }
  .stat.ok .big{color:var(--ok)} .stat.crit .big{color:var(--crit)} .stat.accent .big{color:var(--accent)}

  /* ---- donut ---- */
  .donut-wrap{display:flex;align-items:center;gap:18px}
  .donut{width:120px;height:120px;border-radius:50%;display:grid;place-items:center;flex:none}
  .donut .hole{width:74px;height:74px;border-radius:50%;background:var(--panel);display:grid;place-items:center;
    font-size:18px;font-weight:700;color:var(--text)}
  .legend{font-size:12px;display:grid;gap:6px}
  .legend .row{display:flex;align-items:center;gap:8px;color:var(--text-muted)}
  .legend .sw{width:11px;height:11px;border-radius:2px}

  /* ---- bars (by type) ---- */
  .bars{display:flex;gap:18px;align-items:flex-end;height:84px;justify-content:space-around}
  .bar{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
  .bar .v{font-size:12px;font-weight:700}
  .bar .b{width:100%;max-width:46px;background:var(--btn-grad);border-radius:3px 3px 0 0;min-height:3px}
  .bar .n{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)}

  /* ---- cpu/memory self card ---- */
  .selfcard{background:var(--panel-inner);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:12px}
  .selfhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
  .selfhead .nm{font-weight:700}
  .selfhead .mem{color:var(--text-muted);font-size:12px}
  .meter{display:flex;align-items:center;gap:8px;margin-top:8px}
  .meter .ml{width:34px;font-size:11px;color:var(--text-muted)}
  .meter .track{flex:1;height:8px;background:var(--border-subtle);border-radius:4px;overflow:hidden}
  .meter .fill{height:100%;background:var(--btn-grad);border-radius:4px;transition:width .4s}
  .meter .mv{width:46px;text-align:right;font-weight:700;font-size:12px}

  /* ---- docker stats rows ---- */
  .dock{display:flex;flex-direction:column;gap:8px}
  .dock .row{display:grid;grid-template-columns:1fr 52px 1fr 70px;align-items:center;gap:10px;font-size:12px}
  .dock .dn{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dock .dn .ds{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-right:6px}
  .dock .dn .ds.off{background:var(--text-dim)}
  .dock .cpu{text-align:right;font-weight:700}
  .dock .track{height:7px;background:var(--border-subtle);border-radius:4px;overflow:hidden}
  .dock .fill{height:100%;background:var(--btn-grad)}
  .dock .mm{text-align:right;color:var(--text-muted);font-size:11px}

  /* ---- component map (chips) ---- */
  .map{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:var(--radius);
    padding:7px 10px;background:var(--panel-inner);font-size:12px}
  .chip .d{width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .chip.t-agent .d{background:var(--ok)} .chip.t-mode .d{background:var(--accent)}
  .chip.t-responder .d{background:var(--warn)} .chip.t-service .d{background:#3b6ea5}

  /* ---- list (components) ---- */
  .list{display:flex;flex-direction:column}
  .li{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border-subtle)}
  .li:last-child{border-bottom:0}
  .li .id{font-weight:600} .li .mdl{color:var(--text-dim);margin-left:auto;font-size:11px}
  .badge{font-size:11px;padding:1px 7px;border-radius:10px;background:#e3f0e8;color:var(--ok);border:1px solid #bfe0cd}
  .tag{font-size:10px;text-transform:uppercase;color:var(--text-dim);border:1px solid var(--border);border-radius:3px;padding:0 4px}
  .alert{padding:8px 4px;border-bottom:1px solid var(--border-subtle);font-size:12px}
  .alert:last-child{border-bottom:0}
  .alert .when{color:var(--text-dim);margin-right:8px;font-size:11px}
  .empty{color:var(--text-dim);padding:8px 4px}
  .obs-foot{padding:8px 20px;color:var(--text-dim);font-size:11px;border-top:1px solid var(--border);background:var(--panel)}
</style>
</head>
<body>
<header class="obs-header">
  <div class="obs-logo">◉</div>
  <div>
    <div class="obs-title">Observer</div>
    <div class="obs-sub">Agents · Modes · Backends</div>
  </div>
  <div class="obs-tools">
    <div class="obs-add">
      <button class="obs-btn" id="addBtn" title="show a hidden widget">+ Add widget</button>
      <div class="obs-menu" id="addMenu"></div>
    </div>
    <button class="obs-btn" id="reset" title="re-tidy all widgets to the default layout">Reset layout</button>
    <div class="obs-conn" id="conn"><span class="dot"></span><span id="conn-label">connecting…</span></div>
  </div>
</header>
<div id="banner"></div>
<div class="grid" id="grid"></div>
<footer class="obs-foot"><span id="updated">awaiting first snapshot…</span></footer>

<script>
  const POLL_MS = 3000;
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

  // ---- component classification (drives bars / map / tags) ----
  function typeOf(id){
    if (id.startsWith("agent-")) return "agent";
    if (id.startsWith("mode-")) return "mode";
    if (id.startsWith("responder-")) return "responder";
    return "service";
  }
  const byId=(a,b)=>(a.component_id||"").localeCompare(b.component_id||"");
  function fmtB(b){ if(!b) return "0B"; const u=["B","KiB","MiB","GiB","TiB"]; let i=0,v=b;
    while(v>=1024&&i<u.length-1){v/=1024;i++;} return v.toFixed(i>=2?2:0)+u[i]; }

  // ---- widget registry: each renders its card body from the snapshot {online, alerts} ----
  const WIDGETS = [
    { id:"healthy", title:"Healthy", span:"span3", render:(s)=>
      `<div class="stat ok"><div class="big">${s.online.length}</div><div class="lbl">online</div></div>` },
    { id:"alerts_n", title:"Alerts", span:"span3", render:(s)=>
      `<div class="stat ${s.alerts.length?'crit':''}"><div class="big">${s.alerts.length}</div><div class="lbl">active alerts</div></div>` },
    { id:"donut", title:"Up vs Alerts", span:"span4", render:(s)=>{
      const up=s.online.length, dn=s.alerts.length, tot=up+dn||1, pct=Math.round(up/tot*100), deg=up/tot*360;
      return `<div class="donut-wrap">
        <div class="donut" style="background:conic-gradient(var(--ok) 0 ${deg}deg, var(--crit) ${deg}deg 360deg)">
          <div class="hole">${pct}%</div></div>
        <div class="legend">
          <div class="row"><span class="sw" style="background:var(--ok)"></span>Online: ${up}</div>
          <div class="row"><span class="sw" style="background:var(--crit)"></span>Alerts: ${dn}</div>
        </div></div>`; } },
    { id:"total", title:"Total Components", span:"span2", render:(s)=>
      `<div class="stat accent"><div class="big">${s.online.length}</div><div class="lbl">tracked</div></div>` },
    { id:"bytype", title:"By Type", span:"span4", render:(s)=>{
      const c={agent:0,mode:0,responder:0,service:0};
      s.online.forEach(x=>c[typeOf(x.component_id)]++);
      const mx=Math.max(1,...Object.values(c));
      return `<div class="bars">`+["agent","mode","responder","service"].map(k=>
        `<div class="bar"><div class="v">${c[k]}</div><div class="b" style="height:${Math.round(c[k]/mx*64)}px"></div><div class="n">${k}s</div></div>`).join("")+`</div>`; } },
    { id:"cpumem", title:"CPU / Memory", span:"span4", render:(s)=>{
      const st=s.stats||{}, cpu=st.cpu_pct||0, mem=st.mem_pct||0;
      return `<div class="selfcard">
        <div class="selfhead"><span class="nm">Observer (self)</span><span class="mem">${fmtB(st.mem_used)} / ${fmtB(st.mem_total)}</span></div>
        <div class="meter"><span class="ml">CPU</span><div class="track"><div class="fill" style="width:${Math.min(100,cpu)}%"></div></div><span class="mv">${cpu}%</span></div>
        <div class="meter"><span class="ml">MEM</span><div class="track"><div class="fill" style="width:${Math.min(100,mem)}%"></div></div><span class="mv">${mem}%</span></div>
      </div>`; } },
    { id:"docker", title:"Docker Containers", span:"span6", render:(s)=>{
      const d=s.docker||{};
      if(!d.available) return `<div class="empty">Docker socket not mounted — add /var/run/docker.sock to the observer.</div>`;
      const cs=d.containers||[];
      if(!cs.length) return `<div class="empty">No containers.</div>`;
      return `<div class="dock">`+cs.map(c=>
        `<div class="row"><span class="dn"><span class="ds ${c.state==='running'?'':'off'}"></span>${esc((c.name||'').replace(/^cofiswarm-/,''))}</span>`+
        `<span class="cpu">${c.cpu_pct}%</span>`+
        `<div class="track"><div class="fill" style="width:${Math.min(100,c.mem_pct)}%"></div></div>`+
        `<span class="mm">${fmtB(c.mem_used)}</span></div>`).join("")+`</div>`; } },
    { id:"map", title:"Component Map", span:"span8", render:(s)=>{
      if(!s.online.length) return `<div class="empty">No components online.</div>`;
      return `<div class="map">`+s.online.slice().sort(byId).map(x=>
        `<div class="chip t-${typeOf(x.component_id)}"><span class="d"></span>${esc(x.component_id)}</div>`).join("")+`</div>`; } },
    { id:"components", title:"Components", span:"span6", render:(s)=>{
      if(!s.online.length) return `<div class="empty">No components online.</div>`;
      return `<div class="list">`+s.online.slice().sort(byId).map(x=>
        `<div class="li"><span class="tag">${typeOf(x.component_id)}</span><span class="id">${esc(x.component_id)}</span>`+
        `<span class="badge">${esc(x.status||"online")}</span><span class="mdl">${esc(x.model||"—")}</span></div>`).join("")+`</div>`; } },
    { id:"alertlist", title:"Recent Alerts", span:"span6", render:(s)=>{
      if(!s.alerts.length) return `<div class="empty">No alerts.</div>`;
      const list = s.alerts.slice().reverse().map(a=>
        `<div class="alert"><span class="when">${esc(a.at)}</span>${esc(a.message)}</div>`).join("");
      // Alerts have no TTL; this dismisses resolved ones (POST /v1/alerts/clear).
      return `<button class="clear-alerts" onclick="clearAlerts()">Clear ${s.alerts.length}</button>${list}`; } },
  ];

  // ---- FREE PLACEMENT: each widget keeps its own {col,top}; dragging moves ONLY that widget,
  // the rest never reflow (absolute layout, not a packed grid). × hides; Reset re-tidies. ----
  const HIDDEN_KEY="obs_hidden", POS_KEY="obs_pos";
  const COLS=12, GAP=14, SNAP=8, MIN_W=2, MIN_H=100;
  const widget = (id) => WIDGETS.find(w=>w.id===id);
  // default size from the widget's span / a per-widget height table; a resized widget overrides
  // these with its own {w,h} saved in pos[id]. Fixed heights keep content scrolling INSIDE the
  // card (overflow:auto) instead of overflowing onto neighbours.
  const baseW = (id) => parseInt((widget(id).span||"span3").replace("span",""),10) || 3;
  const HEIGHTS={ healthy:120, alerts_n:120, total:120, donut:220, bytype:220, cpumem:220,
    docker:280, map:300, components:280, alertlist:280 };
  const baseH = (id) => HEIGHTS[id] || 160;
  const cols = (id) => (pos[id] && pos[id].w) || baseW(id);
  const hgt  = (id) => (pos[id] && pos[id].h) || baseH(id);
  let hidden = new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY)||"[]"));
  const saveHidden = () => localStorage.setItem(HIDDEN_KEY, JSON.stringify([...hidden]));
  let pos = JSON.parse(localStorage.getItem(POS_KEY)||"null");   // {id:{col,top}} | null
  const savePos = () => localStorage.setItem(POS_KEY, JSON.stringify(pos));

  // tidy default: flow visible widgets left-to-right, wrapping at COLS — used on first load,
  // for any newly-added widget, and on Reset. After that, positions are whatever the user set.
  function flowLayout(){   // base sizes only, so Reset also clears any custom resize
    let col=0, top=GAP/2, rowH=0; const p={};
    WIDGETS.forEach(w=>{ if(hidden.has(w.id)) return;
      const cw=baseW(w.id);
      if(col+cw>COLS){ col=0; top+=rowH+GAP; rowH=0; }
      p[w.id]={col, top}; rowH=Math.max(rowH, baseH(w.id)); col+=cw; });
    return p;
  }
  function ensurePos(){
    if(!pos) pos=flowLayout();
    const fresh=flowLayout();
    WIDGETS.forEach(w=>{ if(!hidden.has(w.id) && !pos[w.id]) pos[w.id]=fresh[w.id]; });
    savePos();
  }

  function buildGrid(){
    ensurePos();
    $("grid").innerHTML = WIDGETS.filter(w=>!hidden.has(w.id)).map(w=>
      `<section class="card" data-w="${w.id}">
        <div class="card-h" title="drag to move"><span class="grip">⠿</span>
          <span class="ttl">${esc(w.title)}</span><button class="x" data-x="${w.id}">×</button></div>
        <div class="card-b" id="b-${w.id}"></div>
        <div class="resize-h" title="drag to resize"></div></section>`).join("");
    applyPos();
    $("grid").querySelectorAll("[data-x]").forEach(b=>b.onclick=()=>{
      hidden.add(b.dataset.x); saveHidden(); buildGrid(); render(lastSnap);
    });
    wireDrag(); wireResize();
  }

  // place each card by its saved {col,top}; column→% so it stays responsive on width, top in px.
  function applyPos(){
    let bottom=0;
    $("grid").querySelectorAll(".card").forEach(c=>{
      const id=c.dataset.w, w=cols(id), h=hgt(id), p=pos[id]||{col:0,top:GAP/2};
      c.style.left=`calc(${p.col} * (100% / ${COLS}) + ${GAP/2}px)`;
      c.style.width=`calc(${w} * (100% / ${COLS}) - ${GAP}px)`;
      c.style.top=p.top+"px"; c.style.height=h+"px";
      bottom=Math.max(bottom, p.top+h);
    });
    $("grid").style.height=(bottom+GAP)+"px";
  }

  // Drag the card header to move a single widget. A ghost follows the cursor; a dashed preview
  // shows the snapped destination cell. On release ONLY this widget's {col,top} changes — every
  // other widget keeps its position (no reflow). Document-level mouse handlers; geometry only.
  function wireDrag(){
    const gridEl=$("grid");
    gridEl.querySelectorAll(".card").forEach(card=>{
      card.querySelector(".card-h").onmousedown=(e)=>{
        if(e.button!==0 || e.target.closest(".x")) return;   // left button only; not the hide ×
        e.preventDefault();
        const id=card.dataset.w, w=cols(id), h=hgt(id);
        const gr=gridEl.getBoundingClientRect(), colW=gr.width/COLS;
        const r=card.getBoundingClientRect(), offX=e.clientX-r.left, offY=e.clientY-r.top;
        card.classList.add("dragging");
        const ghost=card.cloneNode(true);
        ghost.classList.add("drag-ghost"); ghost.classList.remove("dragging");
        ghost.style.width=r.width+"px"; ghost.style.height=r.height+"px";
        document.body.appendChild(ghost);
        const prev=document.createElement("div"); prev.className="drop-preview"; gridEl.appendChild(prev);
        let target={col:(pos[id]||{}).col||0, top:(pos[id]||{}).top||GAP/2};
        const place=(ev)=>{
          const gl=ev.clientX-offX, gt=ev.clientY-offY;
          ghost.style.left=gl+"px"; ghost.style.top=gt+"px";
          let col=Math.max(0, Math.min(COLS-w, Math.round((gl-gr.left)/colW)));
          let top=Math.max(0, Math.round((gt-gr.top)/SNAP)*SNAP);
          target={col, top};
          prev.style.left=`calc(${col} * (100% / ${COLS}) + ${GAP/2}px)`;
          prev.style.width=`calc(${w} * (100% / ${COLS}) - ${GAP}px)`;
          prev.style.top=top+"px"; prev.style.height=h+"px";
        };
        const up=()=>{
          document.removeEventListener("mousemove",place);
          document.removeEventListener("mouseup",up);
          card.classList.remove("dragging"); ghost.remove(); prev.remove();
          pos[id]={...pos[id], ...target}; savePos(); applyPos();   // move keeps any custom w/h
        };
        place(e);
        document.addEventListener("mousemove",place);
        document.addEventListener("mouseup",up);
      };
    });
  }

  // Drag the bottom-right handle to resize ONE widget — width snaps to columns, height to px.
  // The card resizes live; on release its {w,h} are saved. Others are untouched. stopPropagation
  // keeps the handle from also starting a header move-drag.
  function wireResize(){
    const gridEl=$("grid");
    gridEl.querySelectorAll(".card").forEach(card=>{
      const handle=card.querySelector(".resize-h"); if(!handle) return;
      handle.onmousedown=(e)=>{
        if(e.button!==0) return;
        e.preventDefault(); e.stopPropagation();
        const id=card.dataset.w, p=pos[id]||{col:0,top:GAP/2};
        const gr=gridEl.getBoundingClientRect(), colW=gr.width/COLS;
        const cardLeft=gr.left + p.col*colW, cardTop=gr.top + p.top;
        let curW=cols(id), curH=hgt(id);
        const move=(ev)=>{
          curW=Math.max(MIN_W, Math.min(COLS-p.col, Math.round((ev.clientX-cardLeft)/colW)));
          curH=Math.max(MIN_H, Math.round((ev.clientY-cardTop)/SNAP)*SNAP);
          card.style.width=`calc(${curW} * (100% / ${COLS}) - ${GAP}px)`;
          card.style.height=curH+"px";
        };
        const up=()=>{
          document.removeEventListener("mousemove",move);
          document.removeEventListener("mouseup",up);
          pos[id]={col:p.col, top:p.top, w:curW, h:curH}; savePos(); applyPos();
        };
        document.addEventListener("mousemove",move);
        document.addEventListener("mouseup",up);
      };
    });
  }
  $("reset").onclick=()=>{ hidden.clear(); saveHidden(); pos=flowLayout(); savePos();
    buildGrid(); render(lastSnap); };

  // ---- Add widget: bring a hidden widget back, placed at the bottom-left so it covers nothing ----
  function showWidget(id){
    hidden.delete(id); saveHidden();
    let bottom=GAP/2;
    WIDGETS.forEach(w=>{ if(!hidden.has(w.id) && w.id!==id && pos[w.id]) bottom=Math.max(bottom, pos[w.id].top+hgt(w.id)+GAP); });
    pos[id]={col:0, top:bottom}; savePos();
    buildGrid(); render(lastSnap);
  }
  function refreshAddMenu(){
    const m=$("addMenu"), items=WIDGETS.filter(w=>hidden.has(w.id));
    m.innerHTML = items.length ? items.map(w=>`<button data-add="${w.id}">${esc(w.title)}</button>`).join("")
      : `<div class="empty">All widgets shown</div>`;
    m.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>{ showWidget(b.dataset.add); refreshAddMenu(); });
  }
  $("addBtn").onclick=(e)=>{ e.stopPropagation(); refreshAddMenu(); $("addMenu").classList.toggle("open"); };
  document.addEventListener("click",()=>$("addMenu").classList.remove("open"));

  function setConn(cls,label){ $("conn").className="obs-conn "+cls; $("conn-label").textContent=label; }
  function banner(msg){ const b=$("banner"); if(msg){b.textContent=msg;b.classList.add("show");} else b.classList.remove("show"); }

  // Docker stats poll on its own (slower) cadence — its socket read can lag the roster tick.
  let dockerData = { available:false, containers:[] };
  async function pollDocker(){
    try{
      const r=await fetch("/v1/docker",{cache:"no-store"});
      if(r.ok) dockerData=await r.json();
    }catch(e){ console.error("docker poll:", e); }
    const el=$("b-docker");
    if(el) el.innerHTML=WIDGETS.find(w=>w.id==="docker").render({docker:dockerData});
  }

  let lastSnap = { online:[], alerts:[], stats:{} };   // for instant repaint after a reorder
  function render(snap){
    lastSnap = snap;
    const s={ online:snap.online||[], alerts:snap.alerts||[], stats:snap.stats||{}, docker:dockerData };
    WIDGETS.forEach(w=>{ const el=$("b-"+w.id); if(el) el.innerHTML=w.render(s); });
  }

  async function tick(){
    try{
      const [obsRes, statRes]=await Promise.all([
        fetch("/v1/observed",{cache:"no-store"}),
        fetch("/v1/stats",{cache:"no-store"}).catch(e=>{ console.error("stats fetch:",e); return null; }),
      ]);
      if(!obsRes.ok) throw new Error("HTTP "+obsRes.status);
      const data=await obsRes.json();
      if(statRes && statRes.ok){ try{ data.stats=(await statRes.json()).self||{}; }catch(e){ console.error("stats parse:",e); } }
      banner(data.enabled ? "" : "Bus tail disabled — set COFISWARM_BRIDGE_URL on the observer to see live presence.");
      render(data);
      setConn("live","Live");
      $("updated").textContent="updated "+new Date().toLocaleTimeString();
    }catch(err){
      console.error("observer tick failed:", err);   // never fail silently
      setConn("error","disconnected");
      banner("Failed to reach /v1/observed: "+esc(err.message));
    }
  }
  // Dismiss all alerts, then refresh so the cleared state shows immediately.
  window.clearAlerts = async function(){
    try{
      const res=await fetch("/v1/alerts/clear",{method:"POST",cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      await tick();
    }catch(err){ console.error("clear alerts failed:", err); banner("Failed to clear alerts: "+esc(err.message)); }
  };
  buildGrid(); tick(); setInterval(tick, POLL_MS);
  pollDocker(); setInterval(pollDocker, 5000);
</script>
</body>
</html>
